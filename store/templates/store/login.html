{% extends 'store/base.html' %}

{% block title %}Login - Street Access{% endblock %}

{% block content %}
<form id="login-form">
    {% csrf_token %}
    <h2>Welcome Back!</h2>
    <p style="text-align: center; color: #6b7280;">Sign in to your account</p>
    
    <label for="username">Username</label>
    <input type="text" id="username" name="username" required>
    
    <label for="password">Password</label>
    <input type="password" id="password" name="password" required>
    
    <button type="submit" id="submit-btn">Login</button>
    
    <div id="loading" style="display:none;">
        <div style="text-align: center;">
            <p>🔄 Logging in...</p>
        </div>
    </div>
    <div id="error"></div>
    
    <p style="text-align: center; margin-top: 1.5rem;">
        Don't have an account? <a href="/signup/" style="color: #7c3aed; text-decoration: none; font-weight: 600;">Sign Up</a>
    </p>
</form>

<script>
document.getElementById('login-form').addEventListener('submit', function(e) {
    e.preventDefault();
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('loading').style.display = 'block';
    document.getElementById('error').innerHTML = '';
    
    const formData = new FormData(this);
    fetch('/login/', {
        method: 'POST',
        body: formData,
        headers: {
            'X-CSRFToken': document.querySelector('[name=csrfmiddlewaretoken]').value
        }
    })
    .then(response => response.json())
    .then(data => {
        document.getElementById('loading').style.display = 'none';
        if (data.success) {
            window.location.href = '/';
        } else {
            document.getElementById('submit-btn').style.display = 'block';
            document.getElementById('error').innerHTML = '<p class="error-message">❌ ' + data.error + '</p>';
        }
    });
});
</script>
{% endblock %}
